# lychee link checker config — used by docs-health CI job
#
# Run offline (internal links only) in CI:
#   lychee --offline docs/**/*.md README.md agents.md CHANGELOG.md
# Run external checks on schedule only (not on every PR).

# Timeout for HTTP requests (not used in --offline mode)
timeout = 20

# Max retries per URL
max_retries = 2

# Exclude localhost and loopback links — not real external targets
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  # Anchor-only links are checked at render time, not by lychee
  "^#",
  # Badge URLs — shields.io is rate-limited; check on schedule only
  "^https://img\\.shields\\.io",
  # NPM badges
  "^https://www\\.npmjs\\.com",
]

# Accept these HTTP status codes as valid
accept = [200, 206, 429]
